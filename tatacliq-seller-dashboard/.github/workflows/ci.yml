# Frontend-only CI.
# The backend (apps/api) and Python workers (workers/python) are Phase 2-4
# scaffolding — not part of the deployed app. They'll get their own CI jobs
# once they're production-ready. For now we only verify what Vercel deploys.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
        env:
          # Build doesn't need a real key — fallback engine kicks in.
          NEXT_TELEMETRY_DISABLED: '1'
